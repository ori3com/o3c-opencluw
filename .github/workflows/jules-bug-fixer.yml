name: Jules Fix Trusted Bug Reports

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: read

concurrency:
  group: jules-bug-fix-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  fix-bug:
    if: >
      github.event.issue.state == 'open' &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association) &&
      (
        (github.event.action == 'opened' && contains(github.event.issue.labels.*.name, 'bug')) ||
        (github.event.action == 'labeled' && github.event.label.name == 'bug')
      )
    runs-on: ubuntu-latest
    env:
      JULES_API_KEY: ${{ secrets.JULES_API_KEY || secrets.JULES_API_KEY_1 || secrets.JULES_API_KEY_2 || secrets.JULES_API_KEY_3 }}

    steps:
      - name: Skip when no Jules API key is configured
        if: ${{ env.JULES_API_KEY == '' }}
        run: echo "JULES_API_KEY is not configured; skipping Jules invocation."

      - name: Invoke Jules
        if: ${{ env.JULES_API_KEY != '' }}
        uses: google-labs-code/jules-invoke@v1
        with:
          prompt: |
            You are fixing a trusted GitHub bug report for OpenClaw Assistant, an Android voice assistant app built with Kotlin, Jetpack Compose, gateway networking, device integrations, and Robolectric-based unit tests.

            Issue:
            - Number: #${{ github.event.issue.number }}
            - Title: ${{ github.event.issue.title }}
            - URL: ${{ github.event.issue.html_url }}
            - Author association: ${{ github.event.issue.author_association }}

            Bug report:
            ${{ github.event.issue.body }}

            Requirements:
            - Diagnose the bug from the issue details and existing code before changing anything.
            - Make the narrowest fix that resolves the reported behavior without broad refactors.
            - Add or update a focused regression test whenever the code path is testable under `app/src/test`.
            - Preserve security and privacy behavior, especially around tokens, encrypted settings, permissions, and gateway credentials.
            - If the report lacks enough detail for a safe fix, do not make speculative changes.
            - Do not touch release signing or release-only secrets for an app-level bug fix.

            Validation:
            - Use the same Firebase-stub bootstrap strategy as `.github/workflows/ci.yml` when running Gradle without secrets.
            - Run `./gradlew lintStandardDebug`
            - Run `./gradlew testStandardDebugUnitTest`
            - Run `./gradlew assembleStandardDebug`
          jules_api_key: ${{ env.JULES_API_KEY }}
          starting_branch: main
          include_commit_log: true
